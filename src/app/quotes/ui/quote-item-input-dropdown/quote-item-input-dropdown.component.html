<div class="group relative w-full">
  <div class="relative flex items-center">
    <span class="pointer-events-none absolute left-2">•</span>
    <button
      type="button"
      (click)="dropdownOpen.set(!dropdownOpen())"
      class="hover:outline-border flex w-full cursor-pointer items-center justify-between rounded-md px-2 py-1 pl-6 text-left hover:outline"
      [ngClass]="{ 'outline-border outline': dropdownOpen() }"
    >
      <span [ngClass]="{ underline: quoteItemInput().isCustomValue }">
        {{ quoteItemInput().displayText }}
      </span>
      <div
        class="invisible flex items-center gap-2 group-hover:visible"
        [ngClass]="{ visible: dropdownOpen() }"
      >
        <span class="text-foreground/70 text-sm">
          {{ productInput().name }} = {{ quoteItemInput().value }}
        </span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="size-3 transition-transform"
          [ngClass]="{ 'rotate-180': dropdownOpen() }"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
        </svg>
      </div>
    </button>
  </div>
  <div
    class="bg-card absolute z-10 mt-1 w-full origin-top rounded-md border shadow-sm"
    [ngClass]="
      dropdownOpen()
        ? 'scale-y-100 opacity-100 transition-all'
        : 'pointer-events-none scale-y-0 opacity-0 transition-none'
    "
  >
    @for (option of productInput().options; track option.value) {
      <div (click)="optionClick(option)" class="hover:bg-input cursor-pointer p-2">
        <div class="font-semibold">{{ option.displayText }}</div>
        <div class="text-foreground/70 text-sm">{{ productInput().name }} = {{ option.value }}</div>
      </div>
    }
    @if (productInput().allowCustomValue) {
      <div (click)="showCustom()" class="hover:bg-input cursor-pointer p-2">
        <div class="font-semibold">Enter custom value</div>
        <div class="text-foreground/70 text-sm">Custom</div>
      </div>
    }
  </div>
</div>
