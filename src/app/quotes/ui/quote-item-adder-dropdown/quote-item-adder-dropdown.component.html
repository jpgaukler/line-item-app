<div class="group relative w-full">
  <div class="relative flex items-center">
    <span class="pointer-events-none absolute left-2">•</span>
    <button
      type="button"
      (click)="dropdownOpen.set(!dropdownOpen())"
      class="hover:outline-border flex w-full cursor-pointer items-center justify-between rounded-md px-2 py-1 pl-6 text-left hover:outline"
      [ngClass]="{ 'outline-border outline': dropdownOpen() }"
    >
      <span [ngClass]="{ underline: isCustomValue() }">
        {{ quoteItemAdder().displayText }}
      </span>
      <div class="flex items-center gap-2">
        <span class="text-foreground/70"> + {{ quoteItemAdder().price | currency }} </span>
        <svg
          app-icon-chevron-down
          class="invisible size-3 transition-transform group-hover:visible"
          [ngClass]="{ 'rotate-180': dropdownOpen(), visible: dropdownOpen() }"
        ></svg>
      </div>
    </button>
  </div>
  <div
    class="bg-card absolute z-10 mt-1 w-full origin-top rounded-md border shadow-sm"
    [ngClass]="
      dropdownOpen()
        ? 'scale-y-100 opacity-100 transition-all'
        : 'pointer-events-none scale-y-0 opacity-0 transition-none'
    "
  >
    @for (option of productAdder().options; track option.displayText) {
      <div
        (click)="optionClick(option)"
        class="hover:bg-input flex cursor-pointer flex-row justify-between p-2"
      >
        <div>{{ option.displayText }}</div>
        <div class="text-foreground/70 text-sm">+ {{ option.price | currency }}</div>
      </div>
    }
    @if (productAdder().allowCustomValue) {
      <div (click)="showCustom()" class="hover:bg-input cursor-pointer p-2">
        <div class="font-semibold">Enter custom value</div>
        <div class="text-foreground/70 text-sm">Custom</div>
      </div>
    }
  </div>
</div>
