<div class="ml-2 flex flex-row items-center gap-2">
  <button
    type="button"
    class="group flex h-6 w-6 cursor-pointer items-center justify-center rounded-full"
    (click)="setDefaultClick.emit()"
  >
    <div
      class="bg-input h-3 w-3 rounded-full"
      [ngClass]="{
        'bg-primary': isDefaultOption(),
        'group-hover:bg-primary': !isDefaultOption(),
      }"
    ></div>
  </button>

  <div class="flex flex-1 flex-col">
    <input
      type="text"
      [formField]="optionForm().displayText"
      placeholder="Option"
      class="hover:bg-input focus:bg-input flex-1 rounded-md border p-2"
    />
    <!-- @if (
      option.controls.displayText.hasError('duplicateOptionDisplayText') &&
      option.controls.displayText.touched
    ) {
      <div class="text-destructive text-sm">Display text must be unique</div>
    } -->
  </div>

  <div class="flex flex-col">
    <input
      type="number"
      [formField]="optionForm().price"
      placeholder="Price"
      class="hover:bg-input focus:bg-input rounded-md border p-2"
    />
  </div>

  <button type="button" class="hover:bg-muted rounded-md p-2" (click)="removeClick.emit()">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      class="size-5"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
      />
    </svg>
  </button>
</div>
