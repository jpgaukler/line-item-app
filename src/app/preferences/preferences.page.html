<div>Theme</div>
<button class="hover:bg-muted rounded-md p-2" (click)="this.layoutService.setLightTheme$.next()">
  <svg app-icon-sun class="size-4"></svg>
</button>
<button class="hover:bg-muted rounded-md p-2" (click)="this.layoutService.setDarkTheme$.next()">
  <svg app-icon-moon class="size-4"></svg>
</button>
<button class="hover:bg-muted rounded-md p-2" (click)="this.layoutService.setSystemTheme$.next()">
  <svg app-icon-computer-desktop class="size-4"></svg>
</button>
