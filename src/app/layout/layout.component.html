<app-layout-sidebar [isOpen]="layoutService.sidebarOpen()"></app-layout-sidebar>
<app-layout-topbar
  [breadcrumbs]="layoutService.breadcrumbs()"
  [sidebarOpen]="layoutService.sidebarOpen()"
  (toggleSidebarClick)="layoutService.toggleSidebar$.next()"
></app-layout-topbar>
<main
  class="mt-topbar-height min-h-[calc(100vh-(var(--spacing-topbar-height)))] p-4 transition-[margin-left]"
  [ngClass]="{ 'ml-sidebar-width': layoutService.sidebarOpen() }"
>
  <router-outlet />
</main>
