<header
  class="h-topbar-height fixed top-0 right-0 left-0 z-50 bg-gray-200 shadow-sm transition-[margin-left]"
  [ngClass]="{ 'ml-sidebar-width': sidebarOpen() }"
>
  <div class="flex h-full items-center justify-between p-4">
    <button (click)="toggleSidebarClick.emit()">Toggle</button>
    <div class="p-4 font-bold">Topbar</div>
  </div>
</header>
