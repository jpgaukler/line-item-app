<header
  class="h-topbar-height bg-card fixed top-0 right-0 left-0 z-50 border-b transition-[margin-left]"
  [ngClass]="{ 'ml-sidebar-width': sidebarOpen() }"
>
  <div class="flex h-full items-center justify-between p-4">
    <!-- Hamburger Menu Button -->
    <button
      class="hover:bg-input cursor-pointer rounded-md p-2"
      (click)="toggleSidebarClick.emit()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
        />
      </svg>
    </button>

    <!-- Breadcrumbs -->
    <nav>
      <ol class="flex items-center gap-0">
        @for (breadcrumb of breadcrumbs(); track breadcrumb.url; let last = $last) {
          <li>
            <a [routerLink]="breadcrumb.url" class="rounded p-2 hover:underline">
              {{ breadcrumb.label }}
            </a>
          </li>
          @if (!last) {
            <li>/</li>
          }
        }
      </ol>
    </nav>

    <span class="flex-1"></span>

    <!-- Profile -->
    <a routerLink="/profile" class="p-4 font-bold hover:underline">Profile</a>

    <button
      class="hover:bg-input cursor-pointer rounded-md p-2"
      (click)="toggleAppInformation.emit()"
    >
      Information
    </button>
  </div>
</header>
