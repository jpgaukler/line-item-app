<aside
  class="w-sidebar-width bg-sidebar text-sidebar-foreground fixed top-0 bottom-0 left-0 z-10 transition-transform"
  [ngClass]="{ '-translate-x-full': !isOpen() }"
>
  <div class="flex flex-col gap-2 border-b p-4">
    <div class="text-lg font-bold">QuotePro</div>
    <div class="text-sm">Material Handling Systems</div>
  </div>
  <nav class="flex flex-col gap-2 p-2">
    @for (item of menuItems; track item.route) {
      <a
        [routerLink]="item.route"
        class="hover:bg-muted rounded-md p-3 font-medium"
        routerLinkActive="bg-sidebar-accent"
      >
        {{ item.label }}
      </a>
    }
  </nav>
</aside>
